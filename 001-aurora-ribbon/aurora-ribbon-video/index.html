<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>视觉测试</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three/build/three.module.js",
          "three/addons/": "./vendor/three/examples/jsm/"
        }
      }
    </script>
    <style>
      @font-face {
        font-family: "Noto Sans SC Local";
        src: url("./assets/fonts/NotoSansSC-VF.ttf") format("truetype");
        font-weight: 100 900;
      }

      @font-face {
        font-family: "Noto Serif SC Local";
        src: url("./assets/fonts/NotoSerifSC-VF.ttf") format("truetype");
        font-weight: 100 900;
      }

      :root {
        color: #f7f0e8;
        background: #08080a;
        font-family: "Noto Sans SC Local", sans-serif;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        margin: 0;
        overflow: hidden;
      }

      body {
        background:
          radial-gradient(circle at 50% 62%, rgba(124, 255, 227, 0.12), transparent 28rem),
          radial-gradient(circle at 60% 70%, rgba(255, 193, 107, 0.08), transparent 25rem),
          linear-gradient(145deg, #0a0a0d 0%, #11100e 48%, #07070a 100%);
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        isolation: isolate;
        background:
          radial-gradient(circle at 50% 62%, rgba(124, 255, 227, 0.12), transparent 28rem),
          radial-gradient(circle at 60% 70%, rgba(255, 193, 107, 0.08), transparent 25rem),
          linear-gradient(145deg, #0a0a0d 0%, #11100e 48%, #07070a 100%);
      }

      #scene {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      .veil {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        background:
          linear-gradient(180deg, rgba(8, 8, 10, 0.76) 0%, rgba(8, 8, 10, 0.12) 34%, rgba(8, 8, 10, 0.38) 100%),
          radial-gradient(circle at 50% 60%, transparent 0, transparent 30%, rgba(8, 8, 10, 0.45) 88%);
      }

      .caption {
        position: relative;
        z-index: 2;
        width: min(56rem, calc(100% - 2rem));
        margin: 0 auto;
        padding: 72px 16px 0;
        text-align: center;
        pointer-events: none;
      }

      h1 {
        margin: 0;
        color: #fff9ef;
        font-family: "Noto Serif SC Local", serif;
        font-size: 132px;
        font-weight: 600;
        line-height: 1;
        letter-spacing: 0;
        text-shadow: 0 0 2rem rgba(112, 255, 228, 0.08);
      }

      .subtitle {
        max-width: 100%;
        margin: 24px 0 0;
        color: rgba(247, 240, 232, 0.82);
        font-size: 36px;
        font-weight: 500;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="35"
      data-width="1920"
      data-height="1080"
    >
      <canvas id="scene" aria-label="视觉错觉旋转体" data-layout-ignore></canvas>
      <div class="veil" data-layout-ignore></div>
      <section class="caption" aria-label="视觉测试说明" data-layout-allow-occlusion>
        <h1>视觉测试</h1>
        <p class="subtitle">你能用意念改变它的旋转方向吗？</p>
      </section>
    </div>

    <script type="module">
      import * as THREE from "three";
      import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
      import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
      import { RenderPass } from "three/addons/postprocessing/RenderPass.js";

      const DURATION = 35;
      const FPS = 30;
      const LOOP_DURATION = DURATION - 1 / FPS;
      const TAU = Math.PI * 2;

      function seededRandom(seed) {
        let value = seed >>> 0;
        return () => {
          value += 0x6d2b79f5;
          let next = value;
          next = Math.imul(next ^ (next >>> 15), next | 1);
          next ^= next + Math.imul(next ^ (next >>> 7), next | 61);
          return ((next ^ (next >>> 14)) >>> 0) / 4294967296;
        };
      }

      function createRibbonSurface(options) {
        const { radialSegments, strands, widthSegments, radius, ribbonWidth, twist, verticalDrift } = options;
        const positions = new Float32Array(radialSegments * strands * widthSegments * 3);
        const indices = new Uint32Array(radialSegments * strands * (widthSegments - 1) * 6);
        let positionOffset = 0;
        let indexOffset = 0;

        for (let strand = 0; strand < strands; strand += 1) {
          const phase = (strand / strands) * TAU;
          const strandBase = strand * radialSegments * widthSegments;

          for (let radial = 0; radial < radialSegments; radial += 1) {
            const angle = (radial / radialSegments) * TAU + phase;
            const pulse = Math.sin(angle * 3 + phase * 0.7) * 0.14;
            const ringRadius = radius + pulse;
            const centerX = Math.cos(angle) * ringRadius;
            const centerZ = Math.sin(angle) * ringRadius;
            const centerY = Math.sin(angle * 2 + phase * 0.35) * verticalDrift;
            const twistAngle = angle * twist + phase * 0.5;
            const radialX = Math.cos(angle);
            const radialZ = Math.sin(angle);
            const radialWeight = Math.sin(twistAngle) * 0.55;
            const verticalWeight = Math.cos(twistAngle) * 0.85;

            for (let width = 0; width < widthSegments; width += 1) {
              const centeredWidth = widthSegments === 1 ? 0 : width / (widthSegments - 1) - 0.5;
              const bandOffset = centeredWidth * ribbonWidth;
              positions[positionOffset] = centerX + radialX * radialWeight * bandOffset;
              positions[positionOffset + 1] = centerY + verticalWeight * bandOffset;
              positions[positionOffset + 2] = centerZ + radialZ * radialWeight * bandOffset;
              positionOffset += 3;
            }
          }

          for (let radial = 0; radial < radialSegments; radial += 1) {
            const nextRadial = (radial + 1) % radialSegments;
            for (let width = 0; width < widthSegments - 1; width += 1) {
              const v00 = strandBase + radial * widthSegments + width;
              const v01 = v00 + 1;
              const v10 = strandBase + nextRadial * widthSegments + width;
              const v11 = v10 + 1;
              indices[indexOffset] = v00;
              indices[indexOffset + 1] = v10;
              indices[indexOffset + 2] = v01;
              indices[indexOffset + 3] = v10;
              indices[indexOffset + 4] = v11;
              indices[indexOffset + 5] = v01;
              indexOffset += 6;
            }
          }
        }

        return { positions, indices };
      }

      const canvas = document.querySelector("#scene");
      const renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true,
        alpha: false,
        powerPreference: "high-performance"
      });
      renderer.setPixelRatio(1);
      renderer.setClearColor(0x08080a, 1);

      const scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x08080a, 0.055);

      const camera = new THREE.OrthographicCamera(-5.022, 5.022, 2.825, -2.825, 0.1, 80);
      camera.position.set(0, 0.24, 8);
      camera.lookAt(0, 0, 0);

      const ribbonGroup = new THREE.Group();
      ribbonGroup.position.set(0, -0.62, 0);
      ribbonGroup.scale.setScalar(0.92);
      scene.add(ribbonGroup);

      const auroraMaterial = new THREE.ShaderMaterial({
        transparent: true,
        depthWrite: false,
        depthTest: false,
        side: THREE.DoubleSide,
        blending: THREE.AdditiveBlending,
        uniforms: {
          uCycle: { value: 0 },
          uOpacity: { value: 0.38 }
        },
        vertexShader: `
          varying vec3 vLocalPosition;

          void main() {
            vLocalPosition = position;
            vec4 worldPosition = modelMatrix * vec4(position, 1.0);
            gl_Position = projectionMatrix * viewMatrix * worldPosition;
          }
        `,
        fragmentShader: `
          precision highp float;

          uniform float uCycle;
          uniform float uOpacity;
          varying vec3 vLocalPosition;

          vec3 palette(float t) {
            vec3 jade = vec3(0.08, 0.95, 0.76);
            vec3 violet = vec3(0.82, 0.36, 1.0);
            vec3 gold = vec3(1.0, 0.73, 0.34);
            vec3 blue = vec3(0.18, 0.38, 1.0);
            vec3 first = mix(jade, violet, smoothstep(-0.55, 0.7, sin(t)));
            vec3 second = mix(gold, blue, smoothstep(-0.35, 0.85, cos(t)));
            return mix(first, second, 0.34 + 0.24 * sin(t * 2.0));
          }

          void main() {
            float flow = vLocalPosition.x * 1.55 + vLocalPosition.y * 2.3 + uCycle;
            float veil = 0.5 + 0.5 * sin(flow);
            float edge = smoothstep(0.04, 0.94, abs(sin(vLocalPosition.z * 2.1 + uCycle * 2.0)));
            float verticalFade = smoothstep(-1.15, -0.05, vLocalPosition.y) * (1.0 - smoothstep(0.65, 1.5, vLocalPosition.y));
            vec3 color = palette(flow) * (0.56 + veil * 0.7 + edge * 0.24);
            float alpha = uOpacity * verticalFade * (0.24 + veil * 0.4 + edge * 0.22);
            gl_FragColor = vec4(color, alpha);
          }
        `
      });

      const surface = createRibbonSurface({
        radialSegments: 196,
        strands: 5,
        widthSegments: 8,
        radius: 1.95,
        ribbonWidth: 0.5,
        twist: 1.24,
        verticalDrift: 0.64
      });

      const ribbonGeometry = new THREE.BufferGeometry();
      ribbonGeometry.setAttribute("position", new THREE.BufferAttribute(surface.positions, 3));
      ribbonGeometry.setIndex(new THREE.BufferAttribute(surface.indices, 1));
      ribbonGeometry.computeBoundingSphere();

      const ribbon = new THREE.Mesh(ribbonGeometry, auroraMaterial);
      ribbon.rotation.x = -0.11;
      ribbonGroup.add(ribbon);

      const haloMaterial = new THREE.LineBasicMaterial({
        color: 0xb9fff1,
        transparent: true,
        opacity: 0.16,
        blending: THREE.AdditiveBlending,
        depthTest: false,
        depthWrite: false
      });
      const halo = new THREE.LineSegments(new THREE.EdgesGeometry(ribbonGeometry, 26), haloMaterial);
      halo.rotation.copy(ribbon.rotation);
      ribbonGroup.add(halo);

      const innerGlow = new THREE.Mesh(
        new THREE.TorusGeometry(1.08, 0.014, 12, 220),
        new THREE.MeshBasicMaterial({
          color: 0xffd98c,
          transparent: true,
          opacity: 0.14,
          blending: THREE.AdditiveBlending,
          depthTest: false,
          depthWrite: false
        })
      );
      innerGlow.scale.set(1, 0.36, 1);
      innerGlow.rotation.x = Math.PI * 0.5;
      ribbonGroup.add(innerGlow);

      function createParticleField(count) {
        const positions = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);
        const random = seededRandom(2187);
        const palette = [
          new THREE.Color(0x6fffe6),
          new THREE.Color(0xb869ff),
          new THREE.Color(0xffcc73)
        ];

        for (let index = 0; index < count; index += 1) {
          const radius = 2.6 + random() * 2.8;
          const angle = random() * TAU;
          const y = (random() - 0.5) * 3.2;
          positions[index * 3] = Math.cos(angle) * radius;
          positions[index * 3 + 1] = y;
          positions[index * 3 + 2] = Math.sin(angle) * radius - 1.2;

          const color = palette[index % palette.length].clone().lerp(new THREE.Color(0xffffff), random() * 0.22);
          colors[index * 3] = color.r;
          colors[index * 3 + 1] = color.g;
          colors[index * 3 + 2] = color.b;
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));

        return new THREE.Points(
          geometry,
          new THREE.PointsMaterial({
            size: 0.025,
            vertexColors: true,
            transparent: true,
            opacity: 0.42,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            depthTest: false
          })
        );
      }

      const particles = createParticleField(520);
      scene.add(particles);

      const composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));
      composer.addPass(new UnrealBloomPass(new THREE.Vector2(1, 1), 0.52, 0.72, 0.16));

      renderer.setSize(1920, 1080, false);
      composer.setSize(1920, 1080);

      const state = { time: 0 };

      function renderFrame() {
        const time = Math.min(state.time, LOOP_DURATION);
        const phase = LOOP_DURATION - time < 0.5 / FPS ? 0 : (time / LOOP_DURATION) * TAU;

        auroraMaterial.uniforms.uCycle.value = phase;
        ribbonGroup.rotation.y = phase;
        ribbonGroup.rotation.z = Math.sin(phase) * 0.035;
        ribbonGroup.rotation.x = 0;

        innerGlow.rotation.z = -phase;
        particles.rotation.y = -phase;
        particles.rotation.z = Math.sin(phase * 2) * 0.02;

        composer.render();
      }

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.to(state, {
        time: DURATION,
        duration: DURATION,
        ease: "none",
        onUpdate: renderFrame
      }, 0);
      window.__timelines.main = tl;

      renderFrame();
    </script>
  </body>
</html>
